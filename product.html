<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!------- Bootstrap cdn ------->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!--=============== Swiper.js ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />


    <!-------Custom style ------->
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/product.css">


</head>

<body>

    <!------- Header ------->
    <header>
        <!------- Header Top ------->
        <div class="py-2 text-white" id="header-top">
            <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">

                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-telephone"></i>
                    <span>+001234567890</span>
                </div>

                <div class="text-center d-none d-sm-block">
                    Get 50% Off On Selected Items | <a href="#" class="text-white fw-semibold text-decoration-none">Shop
                        Now</a>
                </div>

                <div class="d-flex align-items-center gap-4">

                    <div class="dropdown">
                        <a class="text-white text-decoration-none dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Eng
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                            <li><a class="dropdown-item" href="#">Ita</a></li>
                            <li><a class="dropdown-item" href="#">Fra</a></li>
                            <li><a class="dropdown-item" href="#">Esp</a></li>
                        </ul>
                    </div>

                    <div class="dropdown">
                        <a class="text-white text-decoration-none dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Location
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                            <li><a class="dropdown-item" href="#">Roma</a></li>
                            <li><a class="dropdown-item" href="#">Milano</a></li>
                            <li><a class="dropdown-item" href="#">Napoli</a></li>
                        </ul>
                    </div>

                </div>
            </div>
        </div>

        <!------- Navbar ------->
        <nav class="navbar navbar-expand-lg bg-white py-3 ">
            <div class="container">

                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <div class="position-relative brand-color">
                        <i class="bi bi-cart3 fs-3"></i>
                        <span
                            class="position-absolute top-0 start-50 translate-middle p-1 bg-warning border border-light rounded-circle"
                            style="width: 10px; height: 10px;"></span>
                    </div>
                    <span class="fw-bold fs-4 brand-color">Shopcart</span>
                </a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarMain">

                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium gap-3">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-dark" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Categories
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Electronics</a></li>
                                <li><a class="dropdown-item" href="#">Fashion</a></li>
                                <li><a class="dropdown-item" href="#">Home</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">Deals</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">What's New</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">Delivery</a>
                        </li>
                    </ul>

                    <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-4 mt-3 mt-lg-0">

                        <form class="position-relative" role="search">
                            <input class="form-control rounded-pill search-input py-2" type="search"
                                placeholder="Search Product" aria-label="Search">
                            <i class="bi bi-search search-icon text-muted"></i>
                        </form>

                        <div class="d-flex gap-4 fw-medium">
                            <a href="#" class="text-dark text-decoration-none d-flex align-items-center gap-2">
                                <i class="fa-regular fa-user"></i>
                                <span>Account</span>
                            </a>
                            <a href="#" class="text-dark text-decoration-none d-flex align-items-center gap-2">
                                <i class="fa-solid fa-cart-shopping"></i>
                                <span>Cart</span>
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!------- Main ------->
    <main>
        <!------- Spinner ------->
        <div class="d-flex justify-content-center align-items-center my-5 text-success d-none" id="spinner">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="fs-2 ps-3 pt-3">Caricamento</p>
        </div>

        <div class="container mt-5" id="product-container">

        </div>
    </main>


    <!------- Bootstrap script ------->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!------- Swiper js ------->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!------- Font awesome ------->
    <script src="https://kit.fontawesome.com/49727d7509.js" crossorigin="anonymous"></script>

    <!------- Custom script ------->
    <script src="./assets/js/product.js"></script>
</body>

</html>
